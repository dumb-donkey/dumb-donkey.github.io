<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dumb Donkey</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f0e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 20px;
      text-align: center;
    }

    .logo {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    .tagline {
      font-size: 18px;
      color: #1a3a5c;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: bold;
      opacity: 0.7;
    }

    .social-row {
      display: flex;
      gap: 20px;
      align-items: center;
      justify-content: center;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .social-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    .btn-email { background: #e85d20; color: #fff; }
    .btn-github { background: #1a3a5c; color: #fff; }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── NPUT ── */
    .nput-wrap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99;
      cursor: pointer;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      animation: robotFloat 2.4s ease-in-out infinite;
    }
    .nput-wrap:hover { filter: drop-shadow(0 0 28px rgba(0,200,255,0.9)) drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
    @keyframes robotFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
    @keyframes nputScan { 0%,100% { transform:translateX(-9px); } 50% { transform:translateX(9px); } }
    @keyframes nputBlink { 0%,90%,100% { transform:scaleY(1); } 94% { transform:scaleY(0.06); } 97% { transform:scaleY(1); } }
    @keyframes nputAntGlow { 0%,100% { opacity:.5; transform:scale(1); } 50% { opacity:1; transform:scale(1.5); } }
    @keyframes nputAntBounce { 0%,100% { transform:translateY(0); } 45% { transform:translateY(-5px); } }
    @keyframes nputEyeGlow { 0%,100% { opacity:.7; } 50% { opacity:1; } }
    @keyframes nputBrowFurrow { 0%,78%,100% { transform:translateY(0); } 84% { transform:translateY(-2.5px); } 90% { transform:translateY(0); } }
    @keyframes nputBreathe { 0%,100% { transform:scaleY(1); } 50% { transform:scaleY(1.025); } }
    .nput-eye-l   { animation:nputBlink 4.5s ease-in-out infinite; transform-origin:36px 47px; }
    .nput-eye-r   { animation:nputBlink 4.5s ease-in-out infinite .2s; transform-origin:64px 47px; }
    .nput-scan    { animation:nputScan 2s ease-in-out infinite; }
    .nput-antdot  { animation:nputAntGlow 1.8s ease-in-out infinite; }
    .nput-antg    { animation:nputAntBounce 1.8s ease-in-out infinite; transform-origin:50px 16px; }
    .nput-egl     { animation:nputEyeGlow 2s ease-in-out infinite; }
    .nput-egr     { animation:nputEyeGlow 2s ease-in-out infinite .25s; }
    .nput-body    { animation:nputBreathe 3.2s ease-in-out infinite; transform-origin:50px 97px; }
    .nput-brow-l  { animation:nputBrowFurrow 5s ease-in-out infinite; transform-origin:36px 35px; }
    .nput-brow-r  { animation:nputBrowFurrow 5s ease-in-out infinite .2s; transform-origin:64px 35px; }

  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Dumb Donkey" class="logo">
    <div class="tagline">Building weird, useful things.</div>

    <div class="social-row">
      <a href="mailto:hello@dumbdonkey.fyi" class="social-btn btn-email">
        <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        Say Hello
      </a>
      <a href="https://github.com/dumb-donkey" target="_blank" rel="noopener" class="social-btn btn-github">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.604-3.369-1.341-3.369-1.341-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        GitHub
      </a>
    </div>
  </div>
  <div class="nput-wrap">
    <svg width="110" height="130" viewBox="-5 -8 110 135" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;">
      <defs>
        <radialGradient id="nRG1" cx="32%" cy="25%" r="72%"><stop offset="0%" stop-color="#4a6e98"/><stop offset="55%" stop-color="#2a4a6e"/><stop offset="100%" stop-color="#0e2236"/></radialGradient>
        <radialGradient id="nRG2" cx="32%" cy="22%" r="72%"><stop offset="0%" stop-color="#3e5e88"/><stop offset="55%" stop-color="#223858"/><stop offset="100%" stop-color="#0a1e30"/></radialGradient>
        <radialGradient id="nRG3" cx="35%" cy="28%" r="68%"><stop offset="0%" stop-color="#55eeff"/><stop offset="40%" stop-color="#00aadd"/><stop offset="100%" stop-color="#004466"/></radialGradient>
        <radialGradient id="nRG4" cx="40%" cy="30%" r="70%"><stop offset="0%" stop-color="#2a4060"/><stop offset="100%" stop-color="#0a1828"/></radialGradient>
        <linearGradient id="nRim" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="rgba(0,200,255,0)"/><stop offset="85%" stop-color="rgba(0,200,255,0)"/><stop offset="100%" stop-color="rgba(0,200,255,0.22)"/></linearGradient>
        <linearGradient id="nArmG" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#304e72"/><stop offset="100%" stop-color="#0e2236"/></linearGradient>
        <radialGradient id="nShadow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(0,180,255,0.35)"/><stop offset="100%" stop-color="rgba(0,180,255,0)"/></radialGradient>
      </defs>
      <ellipse class="nput-shadow" cx="50" cy="126" rx="38" ry="7" fill="url(#nShadow)"/>
      <ellipse cx="34" cy="119" rx="13" ry="6.5" fill="url(#nRG4)" stroke="#3a5e82" stroke-width="1.3"/>
      <ellipse cx="30" cy="116" rx="6" ry="2.5" fill="rgba(255,255,255,0.1)"/>
      <ellipse cx="66" cy="119" rx="13" ry="6.5" fill="url(#nRG4)" stroke="#3a5e82" stroke-width="1.3"/>
      <ellipse cx="62" cy="116" rx="6" ry="2.5" fill="rgba(255,255,255,0.1)"/>
      <rect x="1" y="90" width="15" height="24" rx="7.5" fill="url(#nArmG)" stroke="#3a5e82" stroke-width="1.4"/>
      <rect x="84" y="90" width="15" height="24" rx="7.5" fill="url(#nArmG)" stroke="#3a5e82" stroke-width="1.4"/>
      <g class="nput-body">
        <rect x="16" y="88" width="68" height="30" rx="15" fill="url(#nRG2)" stroke="#3a5e82" stroke-width="1.8"/>
        <rect x="28" y="96" width="44" height="16" rx="8" fill="rgba(0,5,18,0.55)" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
        <rect x="33" y="101" width="9" height="6" rx="2" fill="#1e3858" stroke="rgba(0,200,255,0.6)" stroke-width="1"/>
        <rect x="45" y="101" width="9" height="6" rx="2" fill="#1e3858" stroke="rgba(0,200,255,0.6)" stroke-width="1"/>
        <rect x="57" y="101" width="9" height="6" rx="2" fill="#1e3858" stroke="rgba(0,200,255,0.6)" stroke-width="1"/>
      </g>
      <rect x="11" y="18" width="78" height="61" rx="20" fill="url(#nRG1)" stroke="#4a6e90" stroke-width="1.8"/>
      <rect class="nput-rim" x="11" y="18" width="78" height="61" rx="20" fill="url(#nRim)" stroke="none"/>
      <g class="nput-brow-l"><path d="M22 37 Q34 32 43 35" stroke="#091828" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M22 37 Q34 32 43 35" stroke="#1e3858" stroke-width="2" stroke-linecap="round" fill="none"/></g>
      <g class="nput-brow-r"><path d="M57 35 Q66 32 78 37" stroke="#091828" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M57 35 Q66 32 78 37" stroke="#1e3858" stroke-width="2" stroke-linecap="round" fill="none"/></g>
      <rect x="11" y="40" width="78" height="17" fill="rgba(0,6,20,0.7)"/>
      <clipPath id="nVC"><rect x="11" y="40" width="78" height="17"/></clipPath>
      <g clip-path="url(#nVC)">
        <line class="nput-scan" x1="28" y1="40" x2="28" y2="57" stroke="rgba(0,220,255,0.55)" stroke-width="2"/>
        <rect class="nput-scan" x="18" y="40" width="20" height="17" fill="rgba(0,200,255,0.08)"/>
      </g>
      <g class="nput-eye-l">
        <ellipse class="nput-egl" cx="36" cy="48" rx="10.5" ry="9" fill="url(#nRG3)" stroke="#00d4ff" stroke-width="1.2" opacity=".9"/>
        <ellipse cx="36" cy="48" rx="6" ry="5.5" fill="rgba(0,8,25,0.9)"/>
        <clipPath id="nCL"><ellipse cx="36" cy="48" rx="5.5" ry="5"/></clipPath>
        <g clip-path="url(#nCL)"><line class="nput-scan" x1="36" y1="43" x2="36" y2="53" stroke="#00eeff" stroke-width="2.5"/></g>
        <ellipse cx="31" cy="43" rx="3.5" ry="2.5" fill="rgba(255,255,255,0.55)"/>
      </g>
      <g class="nput-eye-r">
        <ellipse class="nput-egr" cx="64" cy="48" rx="10.5" ry="9" fill="url(#nRG3)" stroke="#00d4ff" stroke-width="1.2" opacity=".9"/>
        <ellipse cx="64" cy="48" rx="6" ry="5.5" fill="rgba(0,8,25,0.9)"/>
        <clipPath id="nCR"><ellipse cx="64" cy="48" rx="5.5" ry="5"/></clipPath>
        <g clip-path="url(#nCR)"><line class="nput-scan" x1="64" y1="43" x2="64" y2="53" stroke="#00eeff" stroke-width="2.5" style="animation-delay:.3s"/></g>
        <ellipse cx="59" cy="43" rx="3.5" ry="2.5" fill="rgba(255,255,255,0.55)"/>
      </g>
      <path d="M36 67 L45 67 Q50 69.5 55 67 L64 67" stroke="#4a6e90" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <g class="nput-antg">
        <line x1="44" y1="6" x2="44" y2="19" stroke="#5588aa" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="56" y1="6" x2="56" y2="19" stroke="#5588aa" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="44" cy="6" r="4.5" fill="#1a3050" stroke="#5588aa" stroke-width="1.5"/>
        <circle class="nput-antdot" cx="44" cy="6" r="2.5" fill="#00d4ff"/>
        <circle cx="56" cy="6" r="4.5" fill="#1a3050" stroke="#5588aa" stroke-width="1.5"/>
        <circle class="nput-antdot" cx="56" cy="6" r="2.5" fill="#00d4ff" style="animation-delay:.7s"/>
      </g>
    </svg>
  </div>
</body>
</html>
