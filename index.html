<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dumb Donkey</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f0e8;
      min-height: 100vh;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── TOP HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 60px 30px;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand-name {
      font-size: 36px;
      font-weight: 900;
      color: #1a3a5c;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 14px;
      color: #1a3a5c;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.55;
    }

    .social-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 4px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .social-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.18); }
    .btn-email { background: #e85d20; color: #fff; }
    .btn-github { background: #1a3a5c; color: #fff; }
    .social-btn svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

    /* ── MAIN CONTENT AREA ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      padding: 0 60px 60px;
      align-items: start;
    }

    /* ── LEFT: COMIC BOOK ── */
    .comic-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .comic-label {
      font-size: 10px;
      color: #1a3a5c;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.4;
      font-weight: bold;
    }

    .comic-book {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      perspective: 1200px;
      border-radius: 8px;
      box-shadow: 8px 8px 0 #c8a87a, 10px 10px 24px rgba(0,0,0,0.25);
    }

    .comic-page {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 4px solid #1a1a1a;
      backface-visibility: hidden;
      transform-origin: left center;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    }

    .comic-page iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
    .comic-page.flip-out { transform: rotateY(-180deg); z-index: 1; }
    .comic-page.active { z-index: 2; transform: rotateY(0deg); }
    .comic-page.behind { z-index: 0; transform: rotateY(0deg); }

    .comic-dots { display: flex; gap: 8px; }
    .comic-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8a87a; opacity: 0.3; transition: opacity 0.3s; }
    .comic-dot.on { opacity: 1; background: #e85d20; }

    /* ── RIGHT: placeholder for future content ── */
    .right-section {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding-top: 10px;
    }

    .right-label {
      font-size: 10px;
      color: #1a3a5c;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.4;
      font-weight: bold;
    }

    .app-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .app-card-title {
      font-size: 22px;
      font-weight: 900;
      color: #1a3a5c;
    }

    .app-card-desc {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      font-family: Arial, sans-serif;
      font-weight: normal;
    }

    .app-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #e85d20;
      color: #fff;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: bold;
      text-decoration: none;
      width: fit-content;
      box-shadow: 0 4px 14px rgba(232,93,32,0.35);
      transition: transform 0.15s;
    }

    .app-badge:hover { transform: translateY(-2px); }

    /* ── NPUT ── */
    .nput-wrap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 99;
      cursor: pointer;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.5)) drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      animation: robotFloat 2.4s ease-in-out infinite;
    }
    .nput-wrap:hover { filter: drop-shadow(0 0 28px rgba(0,200,255,0.9)) drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }
    @keyframes robotFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
    @keyframes nputScan { 0%,100% { transform:translateX(-9px); } 50% { transform:translateX(9px); } }
    @keyframes nputBlink { 0%,90%,100% { transform:scaleY(1); } 94% { transform:scaleY(0.06); } 97% { transform:scaleY(1); } }
    @keyframes nputAntGlow { 0%,100% { opacity:.5; transform:scale(1); } 50% { opacity:1; transform:scale(1.5); } }
    @keyframes nputAntBounce { 0%,100% { transform:translateY(0); } 45% { transform:translateY(-5px); } }
    @keyframes nputEyeGlow { 0%,100% { opacity:.7; } 50% { opacity:1; } }
    @keyframes nputBrowFurrow { 0%,78%,100% { transform:translateY(0); } 84% { transform:translateY(-2.5px); } 90% { transform:translateY(0); } }
    @keyframes nputBreathe { 0%,100% { transform:scaleY(1); } 50% { transform:scaleY(1.025); } }
    .nput-eye-l   { animation:nputBlink 4.5s ease-in-out infinite; transform-origin:36px 47px; }
    .nput-eye-r   { animation:nputBlink 4.5s ease-in-out infinite .2s; transform-origin:64px 47px; }
    .nput-scan    { animation:nputScan 2s ease-in-out infinite; }
    .nput-antdot  { animation:nputAntGlow 1.8s ease-in-out infinite; }
    .nput-antg    { animation:nputAntBounce 1.8s ease-in-out infinite; transform-origin:50px 16px; }
    .nput-egl     { animation:nputEyeGlow 2s ease-in-out infinite; }
    .nput-egr     { animation:nputEyeGlow 2s ease-in-out infinite .25s; }
    .nput-body    { animation:nputBreathe 3.2s ease-in-out infinite; transform-origin:50px 97px; }
    .nput-brow-l  { animation:nputBrowFurrow 5s ease-in-out infinite; transform-origin:36px 35px; }
    .nput-brow-r  { animation:nputBrowFurrow 5s ease-in-out infinite .2s; transform-origin:64px 35px; }

    @media (max-width: 768px) {
      .header { padding: 30px 20px 20px; }
      .main { grid-template-columns: 1fr; padding: 0 20px 40px; }
      .brand-name { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" alt="Dumb Donkey" class="logo">
    <div class="brand">
      <div class="brand-name">Dumb Donkey</div>

      <div class="social-row">

          <svg viewBox="0 0 24 24"><path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>

          GitHub
        </a>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: Comic Book -->
    <div class="comic-section">
      <div class="comic-label">TypeRight — Now on Google Play</div>
      <div class="comic-book" id="comicBook">
        <div class="comic-page active" id="page0"><iframe src="banners/week1.html" scrolling="no"></iframe></div>
        <div class="comic-page behind" id="page1"><iframe src="banners/week2.html" scrolling="no"></iframe></div>
        <div class="comic-page behind" id="page2"><iframe src="banners/week3.html" scrolling="no"></iframe></div>
        <div class="comic-page behind" id="page3"><iframe src="banners/week4.html" scrolling="no"></iframe></div>
        <div class="comic-page behind" id="page4"><iframe src="banners/week5.html" scrolling="no"></iframe></div>
      </div>
      <div class="comic-dots">
        <div class="comic-dot on" id="dot0"></div>
        <div class="comic-dot" id="dot1"></div>

        <div class="comic-dot" id="dot3"></div>

      </div>
    </div>

    <!-- RIGHT: App Info -->
    <div class="right-section">
      <div class="right-label">Our Latest App</div>
      <div class="app-card">
        <div class="app-card-title">TypeRight ⌨️</div>
        <div class="app-card-desc">
          The keyboard that fits how you actually type. AI built in, 8 skins, notebook — all free. No subscription. No nonsense.
        </div>
        <a href="https://play.google.com/store/apps/details?id=com.sy5temn3xt.typeright" target="_blank" class="app-badge">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3 20.5v-17c0-.83 1.01-1.3 1.7-.78l14 8.5c.62.38.62 1.18 0 1.56l-14 8.5c-.69.52-1.7.05-1.7-.78z"/></svg>
          Get it on Google Play
        </a>
      </div>
    </div>

  </div>

  <script>
    const total = 5;
    let current = 0;

    function flipPage() {
      const prev = current;
      current = (current + 1) % total;

      const prevPage = document.getElementById('page' + prev);
      const nextPage = document.getElementById('page' + current);

      prevPage.classList.remove('active');
      prevPage.classList.add('flip-out');
      nextPage.classList.remove('behind');
      nextPage.classList.add('active');

      setTimeout(() => {
        prevPage.classList.remove('flip-out');
        prevPage.classList.add('behind');
      }, 800);

      document.querySelectorAll('.comic-dot').forEach((d, i) => {
        d.classList.toggle('on', i === current);
      });
    }

    setInterval(flipPage, 30000);
  </script>

</body>
