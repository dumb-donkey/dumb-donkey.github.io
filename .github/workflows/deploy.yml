name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000

      - name: Retry deploy on failure
        id: retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
